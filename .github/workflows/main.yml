name: Deploy to VPS

on:
  push:
    branches: ["master"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/chat-backend:latest .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/chat-backend:latest

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: 45.130.164.54
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/chat-server-docker
            docker compose pull
            docker compose up -d